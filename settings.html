<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Miclea</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app-shell.css">
<style>
  /* ===== Settings header (full-width title + divider) ===== */
  .set-top{padding-bottom:18px;border-bottom:1px solid #d1d5db;margin-bottom:0}
  body.theme-dark .set-top{border-bottom-color:#2d323b}
  .set-top h1{font-size:26px;font-weight:700;letter-spacing:-.01em}

  /* ===== Two-column layout: sub-nav + panel ===== */
  .set-layout{display:grid;grid-template-columns:200px 1fr;gap:38px;align-items:start;max-width:1000px;padding-top:24px}

  /* left sub-nav */
  .set-nav{display:flex;flex-direction:column;gap:3px;position:sticky;top:88px}
  .set-tab{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:none;
    color:var(--ink-muted);font-size:14px;font-weight:500;padding:9px 12px;border-radius:9px;transition:.13s}
  .set-tab svg{width:17px;height:17px;flex:none;stroke-width:1.9}
  .set-tab:hover{background:var(--app-line);color:var(--ink)}
  .set-tab.on{background:var(--app-line);color:var(--ink);font-weight:600}

  /* panels */
  .set-panel{display:none;animation:appfade .3s var(--ease-standard) both}
  .set-panel.on{display:block}
  .panel-title{font-size:21px;font-weight:700;letter-spacing:-.01em}
  .panel-rule{height:1px;background:#d1d5db;margin:18px 0 26px}
  body.theme-dark .panel-rule{background:#2d323b}

  /* avatar row */
  .av-row{display:flex;align-items:center;gap:20px;margin-bottom:30px}
  .av-pic{width:64px;height:64px;border-radius:50%;flex:none;background:#111;background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;overflow:hidden}
  body.theme-dark .av-pic{background:#e7e9ee;color:#111}
  .av-pic[data-img="1"]{background-color:transparent}
  .av-btns{display:flex;gap:10px;margin-bottom:8px}
  .av-hint{font-size:12.5px;color:var(--ink-muted)}

  /* buttons */
  .b{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;font-family:inherit;
    font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:8px;transition:.14s;white-space:nowrap}
  .b svg{width:15px;height:15px}
  .b-dark{background:#1a1a1a;color:#fff}
  .b-dark:hover{background:#000}
  body.theme-dark .b-dark{background:#e7e9ee;color:#111}
  body.theme-dark .b-dark:hover{background:#fff}
  .b-gray{background:var(--app-line);color:var(--ink)}
  .b-gray:hover{background:var(--app-line-2)}

  /* fields */
  .field{margin-bottom:18px;max-width:520px}
  .field .lbl{font-size:13px;font-weight:600;margin-bottom:7px;display:block}
  .inp{width:100%;border:1px solid var(--app-line-2);border-radius:9px;padding:11px 13px;font-size:14px;
    font-family:inherit;background:var(--app-card);color:var(--ink);transition:.12s}
  .inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.1)}
  .inp.bad{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.1)}
  .err{font-size:12px;color:#dc2626;margin-top:6px;display:none}
  .err.show{display:block}

  /* credential rows (email / password) — field + action button on the right */
  .cred-rule{height:1px;background:#d1d5db;margin:26px 0}
  body.theme-dark .cred-rule{background:#2d323b}
  .cred-row{display:flex;align-items:flex-end;gap:16px;max-width:760px;margin-bottom:18px}
  .cred-row .field{flex:1;margin-bottom:0}
  .cred-row .b{margin-bottom:1px}

  /* reveal panels */
  .reveal{display:none;border:1px solid var(--app-line);border-radius:13px;padding:20px;margin:4px 0 22px;
    max-width:560px;background:var(--app-bg)}
  .reveal.show{display:block;animation:appfade .25s var(--ease-standard) both}
  body.theme-dark .reveal{background:var(--app-card)}

  /* password strength meter */
  .meter{height:6px;border-radius:100px;background:var(--app-line);overflow:hidden;margin-top:9px}
  .meter i{display:block;height:100%;width:0;border-radius:100px;transition:width .25s,background .25s}
  .meter-lbl{font-size:11.5px;margin-top:5px;font-weight:600}

  /* ===== Appearance: theme picker ===== */
  .sub-head{font-size:14px;font-weight:700;margin-bottom:4px}
  .sub-sub{font-size:13px;color:var(--ink-muted);margin-bottom:16px}
  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:680px;margin-bottom:32px}
  .theme-opt{border:2px solid #e5e7eb;border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .15s;background:#f3f4f6}
  body.theme-dark .theme-opt{border-color:#2d323b;background:#1a1d24}
  .theme-opt:hover:not(.on){border-color:#d1d5db}
  body.theme-dark .theme-opt:hover:not(.on){border-color:#3d4350}
  .theme-opt.on{border-color:var(--brand)}
  /* screenshot preview area */
  .tp-wrap{padding:12px 12px 8px}
  .tp-screen{width:100%;aspect-ratio:4/3;border-radius:10px;overflow:hidden;display:flex;flex-direction:row}
  /* label row */
  .tp-label{padding:10px 14px 14px;display:flex;align-items:center;gap:10px;background:#fff}
  body.theme-dark .tp-label{background:#171a20}
  .tp-radio{width:18px;height:18px;border-radius:50%;border:2px solid #d1d5db;flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
  body.theme-dark .tp-radio{border-color:#4b5563}
  .theme-opt.on .tp-radio{border-color:var(--brand);background:var(--brand)}
  .theme-opt.on .tp-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
  .tp-label span{font-size:13.5px;font-weight:500;color:var(--ink)}

  @media(max-width:760px){
    .set-layout{grid-template-columns:1fr;gap:22px}
    .set-nav{flex-direction:row;position:static;border-bottom:1px solid var(--app-line);padding-bottom:8px}
    .cred-row{flex-direction:column;align-items:stretch}
    .cred-row .b{align-self:flex-start;margin-top:4px}
    .theme-grid{grid-template-columns:1fr}
  }
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/+esm';
const supabase = createClient(
  'https://eezjeiitzvtduarviume.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlemplaWl0enZ0ZHVhcnZpdW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTg4MjAsImV4cCI6MjA5NTg3NDgyMH0.Z2JC8QufY-sVp9VoUg8j08RZjHgKnePWJSZkP8U6oFc'
);
const $ = function(s){ return document.querySelector(s); };

/* ---------- Hydrate fields from the signed-in account ---------- */
function initials(name){
  const parts = String(name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function setAvatar(url, ini){
  const p = $('#avPic');
  if(url){ p.style.backgroundImage='url('+url+')'; p.setAttribute('data-img','1'); p.textContent=''; }
  else { p.style.backgroundImage=''; p.removeAttribute('data-img'); p.textContent=ini||''; }
}
let DEFAULT_INI = 'TH';
async function hydrate(){
  let user = null;
  try { const { data } = await supabase.auth.getUser(); user = data && data.user; }
  catch(e){ /* offline / no session (e.g. local preview) — keep placeholders */ }
  if(!user) return;
  const meta = user.user_metadata || {};
  // Names: prefer explicit first/last, else split the single signup name.
  let first = meta.first_name || meta.given_name || '';
  let last  = meta.last_name  || meta.family_name || '';
  if(!first && !last){
    const full = (meta.name || meta.full_name || '').trim();
    const parts = full.split(/\s+/).filter(Boolean);
    first = parts[0] || '';
    last  = parts.slice(1).join(' ');
  }
  $('#firstName').value = first;
  $('#lastName').value  = last;
  if(user.email) $('#email').value = user.email;
  DEFAULT_INI = initials((first+' '+last).trim() || meta.name || meta.full_name || user.email) || 'U';
  setAvatar(meta.avatar_url || meta.picture || '', DEFAULT_INI);
}
hydrate();

/* ---------- Tabs ---------- */
document.querySelectorAll('.set-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    const name=this.dataset.tab;
    document.querySelectorAll('.set-tab').forEach(function(t){t.classList.toggle('on',t===tab)});
    document.querySelectorAll('.set-panel').forEach(function(p){p.classList.toggle('on',p.dataset.panel===name)});
  });
});

/* ---------- Avatar (preview only — persisting uploads needs a Storage bucket) ---------- */
$('#changeImg').addEventListener('click',function(){$('#imgInput').click();});
$('#imgInput').addEventListener('change',function(){
  const f=this.files&&this.files[0]; if(!f)return;
  if(f.size>3*1024*1024){this.value='';return;}
  const r=new FileReader();
  r.onload=function(e){ setAvatar(e.target.result); };
  r.readAsDataURL(f);
});
$('#removeImg').addEventListener('click',function(){
  setAvatar('', DEFAULT_INI); $('#imgInput').value='';
});

/* ---------- Name → user_metadata ---------- */
$('#saveName').addEventListener('click',async function(){
  const fn=$('#firstName'), ln=$('#lastName'); let ok=true;
  if(!fn.value.trim()){fn.classList.add('bad');ok=false;}else fn.classList.remove('bad');
  if(!ln.value.trim()){ln.classList.add('bad');ok=false;}else ln.classList.remove('bad');
  if(!ok) return;
  const first=fn.value.trim(), last=ln.value.trim(), full=(first+' '+last).trim();
  this.disabled=true; const t0=this.textContent; this.textContent='Saving…';
  const { error } = await supabase.auth.updateUser({ data:{ name:full, full_name:full, first_name:first, last_name:last } });
  this.disabled=false; this.textContent=t0;
  if(error) return;
  DEFAULT_INI = initials(full);
  if(!$('#avPic').getAttribute('data-img')) setAvatar('', DEFAULT_INI);
});

/* ---------- Email reveal → updateUser({ email }) ---------- */
$('#toggleEmail').addEventListener('click',function(){
  const open=$('#emailReveal').classList.toggle('show');
  this.textContent=open?'Cancel':'Change email';
  if(open)$('#newEmail').focus();
});
$('#saveEmail').addEventListener('click',async function(){
  const v=$('#newEmail').value.trim(), valid=/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v);
  $('#newEmail').classList.toggle('bad',!valid);$('#emailErr').classList.toggle('show',!valid);
  if(!valid) return;
  this.disabled=true; const t0=this.textContent; this.textContent='Sending…';
  const { error } = await supabase.auth.updateUser({ email:v });
  this.disabled=false; this.textContent=t0;
  if(error) return;
  $('#emailReveal').classList.remove('show');$('#toggleEmail').textContent='Change email';$('#newEmail').value='';
});

/* ---------- Password reveal + strength → updateUser({ password }) ---------- */
$('#togglePw').addEventListener('click',function(){
  const open=$('#pwReveal').classList.toggle('show');
  this.textContent=open?'Cancel':'Change password';
  if(open)$('#newPw').focus();
});
function strength(p){let s=0;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return s;}
$('#newPw').addEventListener('input',function(){
  const s=strength(this.value), pct=[0,30,55,80,100][s];
  const col=['#dc2626','#dc2626','#f59e0b','#3b82f6','#10b981'][s];
  const lbl=['','Weak','Fair','Good','Strong'][s];
  $('#meterBar').style.width=pct+'%';$('#meterBar').style.background=col;
  $('#meterLbl').textContent=this.value?lbl:'';$('#meterLbl').style.color=col;
});
$('#savePw').addEventListener('click',async function(){
  const np=$('#newPw').value, cf=$('#confPw').value; let ok=true;
  if(strength(np)<2){$('#newPw').classList.add('bad');ok=false;}else $('#newPw').classList.remove('bad');
  if(np!==cf||!cf){$('#confPw').classList.add('bad');$('#confErr').classList.add('show');ok=false;}else{$('#confPw').classList.remove('bad');$('#confErr').classList.remove('show');}
  if(!ok) return;
  this.disabled=true; const t0=this.textContent; this.textContent='Saving…';
  const { error } = await supabase.auth.updateUser({ password:np });
  this.disabled=false; this.textContent=t0;
  if(error) return;
  $('#newPw').value=$('#confPw').value='';$('#meterBar').style.width=0;$('#meterLbl').textContent='';
  $('#pwReveal').classList.remove('show');$('#togglePw').textContent='Change password';
});

/* ---------- Theme ---------- */
function paintTheme(){const t=Miclea.getTheme();document.querySelectorAll('.theme-opt').forEach(function(o){o.classList.toggle('on',o.dataset.t===t)});}
$('#themeGrid').addEventListener('click',function(e){const o=e.target.closest('.theme-opt');if(!o)return;Miclea.setTheme(o.dataset.t);paintTheme();});
paintTheme();

</script>
