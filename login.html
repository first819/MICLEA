<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miclea AI — Log In</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<script type="module" src="auth.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#fff;
    color:#111;
    display:flex;
    align-items:stretch;
    justify-content:stretch;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  .shell{
    width:100%;
    height:100vh;
    background:#fff;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
    padding:16px 16px 16px 0;
  }

  /* ── LEFT ── */
  .left{
    padding:40px 52px 32px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .left>.brand{ width:100%; max-width:440px; }
  .left>h1,.left>p,.left>form{ width:100%; max-width:440px; }

  .brand img{height:30px;width:auto;display:block}

  .headline{
    margin-top:80px;
    font-size:32px;
    font-weight:700;
    letter-spacing:-.02em;
    line-height:1.15;
    color:#111;
  }

  /* OAuth row */
  .oauth-row{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:28px;
  }
  .obtn{
    height:48px;
    border:1.5px solid #e5e5e5;
    border-radius:10px;
    background:#fff;
    display:flex;align-items:center;justify-content:center;gap:9px;
    font-size:14px;font-weight:500;color:#111;
    font-family:inherit;cursor:pointer;
    transition:background .15s,border-color .15s;
    white-space:nowrap;
  }
  .obtn:hover{background:#fafafa;border-color:#d0d0d0}
  .obtn svg{width:19px;height:19px;flex:none}

  /* divider */
  .divider{
    display:flex;align-items:center;gap:14px;
    margin:22px 0;
    color:#bbb;font-size:13px;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#ebebeb}

  /* fields */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13.5px;font-weight:500;color:#333;margin-bottom:7px}
  .field-wrap{position:relative}
  .field input{
    width:100%;
    height:52px;
    border:1.5px solid #e8e8e8;
    border-radius:10px;
    background:#fafafa;
    padding:0 16px;
    font-size:15px;
    font-family:inherit;
    color:#111;
    outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  .field input::placeholder{color:#bbb}
  .field input:focus{border-color:#1f40ed;box-shadow:0 0 0 3px rgba(31,64,237,.08);background:#fff}
  .field .eye{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:#aaa;padding:4px;
    display:flex;align-items:center;
  }
  .field .eye:hover{color:#555}
  .field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  .field-row label{font-size:13.5px;font-weight:500;color:#333}
  .field-row .forgot{font-size:13px;color:#1f40ed;font-weight:500;text-decoration:none}
  .field-row .forgot:hover{text-decoration:underline}

  /* submit */
  .submit{
    width:100%;height:52px;border:none;border-radius:10px;
    background:#1f40ed;color:#fff;
    font-size:15px;font-weight:600;font-family:inherit;
    cursor:pointer;
    transition:background .15s,transform .05s;
    letter-spacing:.01em;
    margin-top:8px;
  }
  .submit:hover{background:#1835cc}
  .submit:active{transform:translateY(1px)}

  /* remember me */
  .check-row{
    display:flex;align-items:center;gap:10px;
    margin:12px 0 4px;
    font-size:13.5px;color:#555;cursor:pointer;
    user-select:none;
  }
  .check-row input[type=checkbox]{
    width:16px;height:16px;accent-color:#1f40ed;cursor:pointer;flex:none;
  }

  .signup-line{margin-top:20px;font-size:14px;color:#888;text-align:center}
  .signup-line a{color:#1f40ed;font-weight:500;text-decoration:none}
  .signup-line a:hover{text-decoration:underline}

  /* ── RIGHT ── */
  .right{
    background:#1f40ed;
    padding:48px 44px 40px;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    border-radius:20px;
  }

  .right-content{
    position:relative;
    z-index:1;
    flex:1;
    display:flex;
    flex-direction:column;
  }

  .right-headline{
    font-family:'Playfair Display',Georgia,serif;
    font-style:italic;
    font-weight:400;
    font-size:52px;
    line-height:1.1;
    color:#fff;
    letter-spacing:-.01em;
    margin-bottom:8px;
  }
  .right-headline span{
    font-family:'Inter',-apple-system,sans-serif;
    font-style:normal;
    font-weight:600;
    font-size:48px;
    color:#fff;
    display:block;
    margin-top:4px;
  }
  .right-sub{
    margin-top:16px;
    font-size:14px;
    color:rgba(255,255,255,.65);
    line-height:1.6;
    max-width:320px;
  }

  .right-bottom{
    flex:1;
    display:flex;
    align-items:flex-end;
  }

  .noise-canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0.12;
    mix-blend-mode:overlay;
    pointer-events:none;
    border-radius:inherit;
  }

  @media (max-width:900px){
    .shell{grid-template-columns:1fr;max-width:500px;min-height:auto}
    .right{display:none}
    .left{padding:34px 28px}
  }
</style>
</head>
<body>
<div class="shell">

  <!-- LEFT -->
  <section class="left">
    <div class="brand">
      <img src="images/logo-new.png" alt="Miclea">
    </div>

    <h1 class="headline">Welcome back</h1>

    <form onsubmit="return false">
      <div class="oauth-row">
        <button type="button" class="obtn" id="googleBtn">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 4.7 29.4 2.7 24 2.7 12.3 2.7 2.7 12.3 2.7 24S12.3 45.3 24 45.3 45.3 35.7 45.3 24c0-1.2-.1-2.4-.3-3.5z"/>
            <path fill="#FF3D00" d="M5.3 14.7l6.6 4.8C13.6 15.1 18.4 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 4.7 29.4 2.7 24 2.7 16.3 2.7 9.7 7 5.3 14.7z"/>
            <path fill="#4CAF50" d="M24 45.3c5.3 0 10.1-2 13.7-5.3l-6.3-5.4c-2 1.5-4.6 2.4-7.4 2.4-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9.6 41 16.2 45.3 24 45.3z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.4c-.4.4 6.7-4.9 6.7-14.9 0-1.2-.1-2.4-.3-3.5z"/>
          </svg>
          Log in with Google
        </button>
      </div>

      <div class="divider">or</div>

      <div class="field">
        <label>Email address</label>
        <div class="field-wrap">
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <div class="field-row">
          <label>Password</label>
          <a href="forgot-password" class="forgot">Forgot password?</a>
        </div>
        <div class="field-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="eye" id="eyeBtn" aria-label="Toggle password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" id="rememberMe">
        Remember me for 30 days
      </label>

      <button type="submit" class="submit" id="loginBtn">Log In</button>

      <p class="signup-line">Don't have an account? <a href="signup">Sign up</a></p>
    </form>
  </section>

  <!-- RIGHT -->
  <aside class="right">
    <canvas class="noise-canvas" id="noiseCanvas"></canvas>
    <div class="right-content">
      <div>
        <h2 class="right-headline">
          Start practicing
          <span>today.</span>
        </h2>
        <p class="right-sub">Perfect your interview skills with real-time feedback.</p>
      </div>
      <div class="right-bottom">
        <!-- dashboard UI goes here -->
      </div>
    </div>
  </aside>

</div>

<script>
  document.getElementById('eyeBtn').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  (function(){
    const c = document.getElementById('noiseCanvas');
    const r = c.parentElement.getBoundingClientRect();
    c.width = r.width; c.height = r.height;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(c.width, c.height);
    for(let i=0;i<img.data.length;i+=4){
      const v = Math.random()*255|0;
      img.data[i]=img.data[i+1]=img.data[i+2]=v;
      img.data[i+3]=255;
    }
    ctx.putImageData(img,0,0);
  })();
</script>
</body>
</html>
