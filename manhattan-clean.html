const bin = atob(B64);
const N = bin.length;
const amp = new Float32Array(N);
for (let i = 0; i < N; i++) amp[i] = bin.charCodeAt(i) / 255;

const FLOOR = 0.06;
const xs = [], ys = [], as = [];
for (let r = 0; r < META.rows; r++) {
  for (let cI = 0; cI < META.cols; cI++) {
    const a = amp[r * META.cols + cI];
    if (a < FLOOR) continue;
    xs.push(cI * META.cell + META.cell / 2);
    ys.push(r * META.cell + META.cell / 2);
    as.push(a);
  }
}
const M = xs.length;
const wx = Float32Array.from(xs), wy = Float32Array.from(ys), wa = Float32Array.from(as);

// ---- tonal palette: pale lavender (sky) -> deep indigo (structure / shadow) ----
const NB = 6;                                 // number of tone bands
const C_LIGHT = [210, 206, 255];              // sparse / sky
const C_DARK  = [40, 32, 112];               // dense / buildings + bridge
function bandColor(t) {                        // t in 0..1
  const r = Math.round(C_LIGHT[0] + (C_DARK[0] - C_LIGHT[0]) * t);
  const g = Math.round(C_LIGHT[1] + (C_DARK[1] - C_LIGHT[1]) * t);
  const b = Math.round(C_LIGHT[2] + (C_DARK[2] - C_LIGHT[2]) * t);
  return `rgb(${r},${g},${b})`;
}
const BAND_COLOR = [];
for (let b = 0; b < NB; b++) BAND_COLOR.push(bandColor(b / (NB - 1)));
// per-dot band index from its base coverage (darker where structure is solid)
const bandIdx = new Uint8Array(M);
for (let i = 0; i < M; i++) {
  let b = Math.floor(wa[i] * NB);
  if (b >= NB) b = NB - 1;
  bandIdx[i] = b;
}
const SHADOW = 'rgba(40,34,90,0.18)';          // soft drop shadow tone

const stage = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let DPR = 1, scale = 1, offX = 0, offY = 0;

function layout() {
  const rect = stage.getBoundingClientRect();
  DPR = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.round(rect.width * DPR);
  canvas.height = Math.round(rect.height * DPR);
  scale = Math.min(rect.width / META.outW, rect.height / META.outH);
  offX = (rect.width - META.outW * scale) / 2;
  offY = (rect.height - META.outH * scale) / 2;
  draw();
}

let mx = -1e6, my = -1e6;
let cx = -1e6, cy = -1e6;
let energy = 0, energyTarget = 0;
let lastMove = -1e9;
let running = false;

function toWorld(clientX, clientY) {
  const rect = stage.getBoundingClientRect();
  return [ (clientX - rect.left - offX) / scale, (clientY - rect.top - offY) / scale ];
}
function moved(e) {
  [mx, my] = toWorld(e.clientX, e.clientY);
  if (cx < -1e5) { cx = mx; cy = my; }
  lastMove = performance.now();
  energyTarget = 1; ensureRunning();
}
stage.addEventListener('pointermove', moved);
stage.addEventListener('pointerenter', moved);
stage.addEventListener('pointerleave', () => { energyTarget = 0; ensureRunning(); });

const RADIUS  = 110;
const SWELL   = 2.2;
const DOT_MIN = 0.35;
const IDLE_MS = 180;
const INV_S2  = 1 / (RADIUS * RADIUS * 0.18);

// top of the image fades to white so it tucks under the white nav bar
const FADE_END = META.outH * 0.13;            // fully solid below this world-Y
function radiusOf(i, active, t) {
  let r = wa[i] * META.dotMax;
  let fade = wy[i] / FADE_END;
  if (fade < 1) r *= (fade < 0 ? 0 : fade * fade);   // ease-in, gone at the very top
  if (active) {
    const dx = wx[i] - cx, dy = wy[i] - cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < RADIUS * 1.6) {
      const angle = Math.atan2(dy, dx);
      const noise = 1 + 0.07 * Math.sin(angle * 3 + t * 1.7)
                      + 0.05 * Math.sin(angle * 4 - t * 2.4);
      const dEff = d / Math.max(0.85, noise);
      const d2Eff = dEff * dEff;
      if (d2Eff < RADIUS * RADIUS) {
        const f = Math.exp(-d2Eff * INV_S2);
        r = Math.max(wa[i] * META.dotMax * 0.5, r - f * SWELL * energy);
      }
    }
  }
  return r;
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const s = scale * DPR, ox = offX * DPR, oy = offY * DPR;
  const e = energy;
  const active = e > 0.003;
  const t = performance.now() * 0.001;
  const sh = Math.max(1, 1.1 * s);            // shadow offset in device px

  // pass 1 — soft drop shadow, offset down-right, gives the blocks a lift
  ctx.fillStyle = SHADOW;
  ctx.beginPath();
  for (let i = 0; i < M; i++) {
    const r = radiusOf(i, active, t);
    if (r < DOT_MIN) continue;
    const pr = r * s;
    const px = wx[i] * s + ox + sh, py = wy[i] * s + oy + sh;
    ctx.rect(px - pr, py - pr, pr * 2, pr * 2);
  }
  ctx.fill();

  // passes 2..N — one batched fill per tone band (light sky -> dark structure)
  for (let b = 0; b < NB; b++) {
    ctx.fillStyle = BAND_COLOR[b];
    ctx.beginPath();
    for (let i = 0; i < M; i++) {
      if (bandIdx[i] !== b) continue;
      const r = radiusOf(i, active, t);
      if (r < DOT_MIN) continue;
      const pr = r * s;
      const px = wx[i] * s + ox, py = wy[i] * s + oy;
      ctx.rect(px - pr, py - pr, pr * 2, pr * 2);
    }
    ctx.fill();
  }
}

function tick() {
  if (performance.now() - lastMove > IDLE_MS) energyTarget = 0;
  energy += (energyTarget - energy) * 0.09;
  cx += (mx - cx) * 0.08;
  cy += (my - cy) * 0.08;
  draw();
  const busy = energyTarget > 0 || energy > 0.003 || Math.abs(energyTarget - energy) > 0.002;
  if (busy) { requestAnimationFrame(tick); }
  else { running = false; energy = 0; draw(); }
}
function ensureRunning() { if (!running) { running = true; requestAnimationFrame(tick); } }

window.addEventListener('resize', layout);
layout();
</script>
</body>
</html>
